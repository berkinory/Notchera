included:
  - Notchera
  - NotcheraXPCHelper
excluded:
  - mediaremote-adapter
  - .build
  - DerivedData
  - .derived-data
  - Notchera.xcodeproj
disabled_rules:
  - cyclomatic_complexity
  - file_length
  - for_where
  - function_body_length
  - identifier_name
  - implicit_optional_initialization
  - large_tuple
  - line_length
  - multiple_closures_with_trailing_closure
  - nesting
  - notification_center_detachment
  - opening_brace
  - statement_position
  - trailing_comma
  - type_body_length
  - type_name
strict: true
reporter: "xcode"
